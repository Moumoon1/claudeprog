<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>原型风险分析 - Design Pilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">&#8592; 返回首页</a>
    <h1>原型风险分析</h1>
  </div>

  <div class="page">
    <div class="page-desc">上传原型截图并描述目标场景，AI 从数据异常、极端操作、权限边界、容错机制等角度挖掘易被忽略的边界情况和隐藏风险。</div>
    <div class="section">
      <h3>&#128101; 目标用户画像</h3>
      <textarea id="persona" rows="6" placeholder="描述目标用户群体特征，例如：25-35岁上班族，碎片化时间使用，对操作效率敏感..."></textarea>
    </div>

    <div class="section">
      <h3>&#128247; 上传原型截图</h3>
      <div class="upload-grid" id="uploadGrid">
        <div class="upload-box" id="uploadBox0" onclick="document.getElementById('fileInput0').click()">
          <input type="file" id="fileInput0" accept="image/*" onchange="handleImage(this, 0)">
          <div class="upload-label" id="label0">
            <span>&#128247;</span>
            点击上传原型截图
          </div>
        </div>
      </div>
      <button class="add-btn" id="addBtn" onclick="addUploadBox()">+ 添加更多截图</button>
    </div>

    <div class="section">
      <h3>&#128221; 业务描述</h3>
      <textarea id="businessDesc" rows="10" placeholder="补充业务逻辑、功能目标、流程说明等（如：这是一个签到领积分功能，用户每日签到一次，连续签到有额外奖励...）"></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="startAnalysis()">
      <span class="spinner"></span>
      <span class="btn-text">开始分析</span>
    </button>

    <div class="error-msg" id="errorMsg" style="display:none"></div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="loading-steps" id="loadingSteps">
        <div class="loading-step" id="stepUpload">
          <span class="step-indicator"></span>
          <span>上传文件</span>
        </div>
        <div class="loading-step" id="stepAnalyze">
          <span class="step-indicator"></span>
          <span>Claude Code 分析中</span>
        </div>
        <div class="loading-step" id="stepDone">
          <span class="step-indicator"></span>
          <span>分析完成</span>
        </div>
      </div>
      <div class="loading-text" id="loadingText">请稍候...</div>
    </div>

    <div class="result-area" id="resultArea">
      <div class="section">
        <h3>&#128203; 分析结果</h3>
        <div class="result-content" id="resultContent"></div>
      </div>
    </div>
  </div>

  <script>
    const uploadedImages = [];
    let uploadCount = 1;

    function handleImage(input, index) {
      const file = input.files[0];
      if (!file) return;
      const box = document.getElementById('uploadBox' + index);

      const reader = new FileReader();
      reader.onload = (e) => {
        uploadedImages[index] = { file, data: e.target.result };
        box.classList.add('has-image');
        box.innerHTML = `<img src="${e.target.result}"><button class="remove-btn" onclick="removeImage(event, ${index})">&times;</button>`;
      };
      reader.readAsDataURL(file);
    }

    function removeImage(e, index) {
      e.stopPropagation();
      uploadedImages[index] = null;
      const box = document.getElementById('uploadBox' + index);
      box.classList.remove('has-image');
      box.innerHTML = `<input type="file" id="fileInput${index}" accept="image/*" onchange="handleImage(this, ${index})"><div class="upload-label" id="label${index}"><span>&#128247;</span>点击上传原型截图</div>`;
    }

    function addUploadBox() {
      const grid = document.getElementById('uploadGrid');
      const index = uploadCount++;
      const div = document.createElement('div');
      div.className = 'upload-box';
      div.id = 'uploadBox' + index;
      div.onclick = () => document.getElementById('fileInput' + index).click();
      div.innerHTML = `<input type="file" id="fileInput${index}" accept="image/*" onchange="handleImage(this, ${index})"><div class="upload-label"><span>&#128247;</span>点击上传原型截图</div>`;
      grid.appendChild(div);
    }

    function setLoading(show, step) {
      const overlay = document.getElementById('loadingOverlay');
      if (show) {
        overlay.classList.add('active');
        if (step) {
          document.querySelectorAll('.loading-step').forEach(s => s.classList.remove('active'));
          document.getElementById(step).classList.add('active');
        }
      } else {
        overlay.classList.remove('active');
      }
    }

    function setStepDone(step) {
      document.getElementById(step).classList.remove('active');
      document.getElementById(step).classList.add('done');
    }

    function setLoadingText(text) {
      document.getElementById('loadingText').textContent = text;
    }

    async function startAnalysis() {
      const persona = document.getElementById('persona').value.trim();
      const businessDesc = document.getElementById('businessDesc').value.trim();
      const validImages = uploadedImages.filter(Boolean);

      if (!persona || validImages.length === 0 || !businessDesc) {
        return alert('请填写用户画像、至少上传一张原型截图，并补充业务描述');
      }

      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const resultArea = document.getElementById('resultArea');
      const resultContent = document.getElementById('resultContent');

      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.style.display = 'none';
      resultArea.classList.remove('visible');
      resultContent.innerHTML = '';

      document.querySelectorAll('.loading-step').forEach(s => {
        s.classList.remove('active', 'done');
      });

      try {
        setLoading(true, 'stepUpload');
        setLoadingText('上传文件中...');

        const formData = new FormData();
        formData.append('files', new Blob([persona], { type: 'text/plain' }), 'persona.txt');
        formData.append('files', new Blob([businessDesc], { type: 'text/plain' }), 'business.txt');
        for (const img of validImages) {
          formData.append('files', img.file);
        }
        formData.append('persona', persona);
        formData.append('businessDesc', businessDesc);

        const uploadRes = await fetch('/api/upload/edgecase', {
          method: 'POST',
          body: formData
        });

        setStepDone('stepUpload');
        if (!uploadRes.ok) throw new Error('上传失败');

        setLoading(true, 'stepAnalyze');
        setLoadingText('Claude Code 启动中...');
        resultArea.classList.add('visible');
        const eventSource = new EventSource('/api/analyze/edgecase');
        let accumulated = '';

        eventSource.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'status') {
            resultContent.innerHTML = `<p style="color:#6366f1">${msg.content}</p>`;
            setLoadingText(msg.content);
          } else if (msg.type === 'chunk') {
            accumulated += msg.content;
            resultContent.innerHTML = marked.parse(accumulated);
            if (accumulated.length > 20) {
              setLoading(false);
              setStepDone('stepAnalyze');
            }
          } else if (msg.type === 'error') {
            errorMsg.textContent = msg.content;
            errorMsg.style.display = 'block';
            setLoading(false);
            eventSource.close();
          } else if (msg.type === 'done') {
            setStepDone('stepAnalyze');
            setStepDone('stepDone');
            setLoadingText('分析完成');
            setTimeout(() => setLoading(false), 600);
            eventSource.close();
          }
        };

        eventSource.onerror = () => {
          eventSource.close();
        };
      } catch (e) {
        setLoading(false);
        errorMsg.textContent = '请求失败: ' + e.message;
        errorMsg.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
