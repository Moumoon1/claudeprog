<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B端看板搭建 - Design Pilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">&#8592; 返回首页</a>
    <h1>B端看板搭建</h1>
  </div>

  <div class="page">
    <div class="page-desc">输入 Figma 组件库链接和需求文档，AI 自动生成 B端看板页面，并调用 Figma 插件将页面直接绘制到画布上。</div>

    <div class="section">
      <h3>&#128279; Figma 组件库链接</h3>
      <input type="text" id="figmaUrl" class="url-input" placeholder="例如：https://www.figma.com/file/xxxx/组件库?node-id=123（可选）">
    </div>

    <div class="section">
      <h3>&#128221; 需求文档</h3>
      <textarea id="prdContent" rows="6" placeholder="描述看板页面的需求，例如：&#10;创建一个数据看板，包含以下模块：&#10;1. 顶部4个统计卡片（用户数、订单数、转化率、收入）&#10;2. 中间折线图区域展示近7天趋势&#10;3. 底部数据表格展示订单明细..."></textarea>
    </div>

    <div class="section">
      <h3>&#127912; 组件库规范（可选）</h3>
      <textarea id="compSpec" rows="4" placeholder="例如：&#10;主色：#722ed1&#10;卡片圆角：12px&#10;字体：PingFang SC&#10;间距系统：8px 基准..."></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="startBuilder()">
      <span class="spinner"></span>
      <span class="btn-text">开始搭建</span>
    </button>

    <div class="error-msg" id="errorMsg" style="display:none"></div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="loading-steps" id="loadingSteps">
        <div class="loading-step" id="stepUpload">
          <span class="step-indicator"></span>
          <span>上传需求</span>
        </div>
        <div class="loading-step" id="stepAnalyze">
          <span class="step-indicator"></span>
          <span>Claude Code 分析并绘制中</span>
        </div>
        <div class="loading-step" id="stepDone">
          <span class="step-indicator"></span>
          <span>绘制完成</span>
        </div>
      </div>
      <div class="loading-text" id="loadingText">请稍候...</div>
    </div>

    <div class="result-area" id="resultArea">
      <div class="section">
        <h3>&#128203; 搭建结果</h3>
        <div class="result-content" id="resultContent"></div>
      </div>
      <div class="section" id="figmaCodeSection" style="display:none">
        <h3>&#9999;&#65039; Figma 插件代码</h3>
        <p style="color:#888;font-size:13px;margin-bottom:12px">
          将下方代码复制后，在 Figma 中点击 <b>插件 → 开发 → 新建插件</b>，粘贴代码后点击运行即可将看板页面绘制到画布上。
        </p>
        <div class="code-block-wrapper">
          <button class="copy-code-btn" onclick="copyFigmaCode()">复制插件代码</button>
          <pre class="code-block" id="figmaCodeBlock"></pre>
        </div>
      </div>
    </div>
  </div>

  <style>
    .url-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      background: #fafafa;
      color: #111;
      line-height: 1.6;
    }
    .url-input:focus {
      outline: none;
      border-color: #111;
      box-shadow: 0 0 0 2px rgba(17,17,17,0.06);
      background: #fff;
    }
    .url-input::placeholder {
      color: #bbb;
    }
    .code-block-wrapper {
      position: relative;
      background: #1e1e2e;
      border-radius: 12px;
      padding: 16px;
      max-height: 500px;
      overflow: auto;
    }
    .code-block {
      margin: 0;
      padding: 0;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.7;
      color: #cdd6f4;
      white-space: pre-wrap;
      word-break: break-word;
      tab-size: 2;
    }
    .copy-code-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 14px;
      background: rgba(255,255,255,0.12);
      color: #cdd6f4;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 1;
      font-family: inherit;
    }
    .copy-code-btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>

  <script>
    function setLoading(show, step) {
      const overlay = document.getElementById('loadingOverlay');
      if (show) {
        overlay.classList.add('active');
        if (step) {
          document.querySelectorAll('.loading-step').forEach(s => s.classList.remove('active'));
          document.getElementById(step).classList.add('active');
        }
      } else {
        overlay.classList.remove('active');
      }
    }

    function setStepDone(step) {
      document.getElementById(step).classList.remove('active');
      document.getElementById(step).classList.add('done');
    }

    function setLoadingText(text) {
      document.getElementById('loadingText').textContent = text;
    }

    async function startBuilder() {
      const prdContent = document.getElementById('prdContent').value.trim();
      const figmaUrl = document.getElementById('figmaUrl').value.trim();
      const compSpec = document.getElementById('compSpec').value.trim();
      if (!prdContent) return alert('请输入需求文档');

      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const resultArea = document.getElementById('resultArea');
      const resultContent = document.getElementById('resultContent');

      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.style.display = 'none';
      resultArea.classList.remove('visible');
      resultContent.innerHTML = '';

      document.querySelectorAll('.loading-step').forEach(s => {
        s.classList.remove('active', 'done');
      });

      try {
        setLoading(true, 'stepUpload');
        setLoadingText('上传需求中...');

        const formData = new FormData();
        const combined =
          (figmaUrl ? `Figma 组件库链接：${figmaUrl}\n\n` : '') +
          `## 需求文档\n${prdContent}` +
          (compSpec ? `\n\n## 组件库规范\n${compSpec}` : '');
        const blob = new Blob([combined], { type: 'text/plain' });
        formData.append('files', blob, 'requirements.txt');
        formData.append('content', combined);
        formData.append('figmaUrl', figmaUrl);
        formData.append('compSpec', compSpec);

        const uploadRes = await fetch('/api/upload/builder', {
          method: 'POST',
          body: formData
        });

        setStepDone('stepUpload');
        if (!uploadRes.ok) throw new Error('上传失败');

        setLoading(true, 'stepAnalyze');
        setLoadingText('Claude Code 启动中...');
        resultArea.classList.add('visible');
        const eventSource = new EventSource('/api/analyze/builder');
        let accumulated = '';

        eventSource.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'status') {
            resultContent.innerHTML = `<p style="color:#6366f1">${msg.content}</p>`;
            setLoadingText(msg.content);
          } else if (msg.type === 'chunk') {
            accumulated += msg.content;
            resultContent.innerHTML = marked.parse(accumulated);
            if (accumulated.length > 20) {
              setLoading(false);
              setStepDone('stepAnalyze');
            }
          } else if (msg.type === 'figma-code') {
            const codeSection = document.getElementById('figmaCodeSection');
            const codeBlock = document.getElementById('figmaCodeBlock');
            codeBlock.textContent = msg.content;
            codeSection.style.display = 'block';
          } else if (msg.type === 'error') {
            errorMsg.textContent = msg.content;
            errorMsg.style.display = 'block';
            setLoading(false);
            eventSource.close();
          } else if (msg.type === 'done') {
            setStepDone('stepAnalyze');
            setStepDone('stepDone');
            setLoadingText('绘制完成');
            setTimeout(() => setLoading(false), 600);
            eventSource.close();
          }
        };

        eventSource.onerror = (e) => {
          eventSource.close();
        };
      } catch (e) {
        setLoading(false);
        errorMsg.textContent = '请求失败: ' + e.message;
        errorMsg.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    async function copyFigmaCode() {
      const codeBlock = document.getElementById('figmaCodeBlock');
      try {
        await navigator.clipboard.writeText(codeBlock.textContent);
        const btn = document.querySelector('.copy-code-btn');
        btn.textContent = '已复制！';
        btn.style.background = '#22c55e';
        setTimeout(() => {
          btn.textContent = '复制插件代码';
          btn.style.background = '';
        }, 2000);
      } catch {
        const textarea = document.createElement('textarea');
        textarea.value = codeBlock.textContent;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert('代码已复制到剪贴板');
      }
    }
  </script>
</body>
</html>
