<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #333;
      background: #fff;
    }
    .header { padding: 16px 16px 12px; border-bottom: 1px solid #eee; }
    .header h2 { font-size: 15px; font-weight: 600; }
    .header p { font-size: 12px; color: #888; margin-top: 4px; }

    .hint {
      margin: 10px 16px; padding: 10px 12px; background: #fefce8;
      border: 1px solid #fde68a; border-radius: 8px; font-size: 12px; color: #92400e;
      line-height: 1.5;
    }
    .hint b { color: #78350f; }

    .section { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    .section h3 {
      font-size: 12px; font-weight: 600; color: #666;
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .node-status { display: flex; gap: 8px; margin-bottom: 8px; }
    .node-tag {
      flex: 1; padding: 8px 10px; border-radius: 6px; font-size: 12px;
      display: flex; align-items: center; gap: 6px; background: #f5f5f5; color: #999;
    }
    .node-tag.valid { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .node-tag.invalid { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .node-info { font-size: 11px; color: #aaa; margin-top: 2px; }

    .server-config {
      padding: 8px 10px; background: #f9fafb; border-radius: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .server-config label { font-size: 12px; color: #666; white-space: nowrap; }
    .server-config input {
      flex: 1; padding: 6px 8px; border: 1px solid #e5e5e5;
      border-radius: 4px; font-size: 12px; font-family: monospace;
    }
    .server-config input:focus { outline: none; border-color: #3b82f6; }

    .bg-text {
      width: 100%; padding: 8px 10px; border: 1px solid #e5e5e5;
      border-radius: 6px; font-size: 12px; font-family: inherit;
      resize: vertical; min-height: 60px;
    }
    .bg-text:focus { outline: none; border-color: #3b82f6; }
    .bg-text::placeholder { color: #ccc; }

    .submit-btn {
      width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff; border: none; border-radius: 8px; font-size: 14px;
      font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .submit-btn.loading { background: #94a3b8; }

    .status-bar {
      padding: 10px 16px; background: #f8fafc; border-top: 1px solid #eee;
      min-height: 40px; display: flex; align-items: center;
    }
    .status-text {
      font-size: 12px; color: #6366f1; display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px; border: 2px solid #e2e8f0;
      border-top-color: #6366f1; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .issues-list { padding: 12px 16px; max-height: 200px; overflow-y: auto; }
    .issue-item {
      padding: 8px 10px; border-radius: 6px; margin-bottom: 6px;
      border-left: 3px solid #ccc; background: #fafafa;
    }
    .issue-item.high { border-left-color: #dc2626; background: #fef2f2; }
    .issue-item.medium { border-left-color: #f59e0b; background: #fffbeb; }
    .issue-item.low { border-left-color: #3b82f6; background: #eff6ff; }
    .issue-title { font-weight: 600; font-size: 12px; margin-bottom: 2px; }
    .issue-desc { font-size: 11px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h2>DesignPilot 走查助手</h2>
    <p>选中开发稿和设计稿两个 Frame 即可开始走查</p>
  </div>

  <div class="hint">
    <b>两步走查：</b>第一步分析设计稿结构 → 第二步用该清单逐项核对开发稿<br>
    帧名称含"开发/dev/实现"自动识别为开发稿，含"设计/design/效果图"自动识别为设计稿
  </div>

  <div class="section">
    <h3>选中内容</h3>
    <div class="node-status">
      <div class="node-tag" id="devTag">
        <span class="dot"></span><span id="devLabel">① 开发稿</span>
      </div>
      <div class="node-tag" id="designTag">
        <span class="dot"></span><span id="designLabel">② 设计稿</span>
      </div>
    </div>
    <div id="devInfo" class="node-info"></div>
    <div id="designInfo" class="node-info"></div>
  </div>

  <div class="section" id="previewSection" style="display:none">
    <h3>导出预览</h3>
    <div style="display:flex;gap:8px;margin-top:8px">
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;color:#16a34a;margin-bottom:4px">开发稿</div>
        <img id="devPreview" style="width:100%;border-radius:6px;border:2px solid #bbf7d0" />
      </div>
      <div style="flex:1;text-align:center">
        <div style="font-size:11px;color:#7c3aed;margin-bottom:4px">设计稿</div>
        <img id="designPreview" style="width:100%;border-radius:6px;border:2px solid #ddd6fe" />
      </div>
    </div>
  </div>

  <div class="section">
    <h3>服务器地址</h3>
    <div class="server-config">
      <label>API</label>
      <input type="text" id="serverUrl" value="http://localhost:3000">
    </div>
  </div>

  <div class="section">
    <h3>背景信息（可选）</h3>
    <textarea class="bg-text" id="bgText" placeholder="例如：这是 APP 首页，包含收益/任务/作品三个卡片区..."></textarea>
  </div>

  <div class="section">
    <button class="submit-btn" id="submitBtn" onclick="startReview()">开始 AI 走查</button>
  </div>

  <div id="issuesList" class="issues-list" style="display:none"></div>

  <div class="status-bar" id="statusBar">
    <div class="status-text" id="statusText" style="display:none"></div>
  </div>

  <script>
    function setStatus(text, show) {
      var el = document.getElementById('statusText');
      if (show) {
        el.style.display = 'flex';
        el.innerHTML = '<div class="spinner"></div><span>' + text + '</span>';
      } else {
        el.style.display = 'none';
      }
    }

    function showIssues(issues) {
      var list = document.getElementById('issuesList');
      if (issues.length === 0) {
        list.style.display = 'block';
        list.innerHTML = '<p style="color:#22c55e;font-size:13px;text-align:center;padding:12px">走查完成，未发现明显问题</p>';
        return;
      }
      list.style.display = 'block';
      list.innerHTML = issues.map(function(issue, i) {
        var sev = issue.severity || 'medium';
        var label = sev === 'high' ? 'P0' : sev === 'medium' ? 'P1' : 'P2';
        return '<div class="issue-item ' + sev + '">' +
          '<div class="issue-title">[' + label + '] ' + (issue.issue || '未命名问题') + '</div>' +
          '<div class="issue-desc">' + (issue.description || '') + '</div>' +
          '</div>';
      }).join('');
    }

    function resetButton() {
      var btn = document.getElementById('submitBtn');
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = '开始 AI 走查';
    }

    function startReview() {
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = '走查中...';
      document.getElementById('issuesList').style.display = 'none';

      parent.postMessage({
        pluginMessage: {
          type: 'start-review',
          bgText: document.getElementById('bgText').value
        }
      }, '*');
    }

    function uploadToServer(devBlob, designBlob, devName, designName, bgText) {
      var serverUrl = document.getElementById('serverUrl').value;

      // Step 1: 上传设计稿，获取页面结构清单
      setStatus('正在分析设计稿结构...', true);
      var designForm = new FormData();
      designForm.append('files', designBlob, 'DESIGN_' + designName + '.png');

      return fetch(serverUrl + '/api/figma/design', { method: 'POST', body: designForm })
        .then(function(r) {
          if (!r.ok) return r.text().then(function(t) { throw new Error('设计稿分析失败: ' + r.status + ' ' + t); });
          return r.json();
        })
        .then(function(designResult) {
          var modules = designResult.modules || [];
          console.log('[figma-review] design modules:', modules);

          // 显示设计稿模块清单
          var list = document.getElementById('issuesList');
          list.style.display = 'block';
          list.innerHTML =
            '<p style="color:#16a34a;font-size:13px;font-weight:600;padding:0 0 8px">第一步完成：设计稿结构分析</p>' +
            modules.map(function(m) {
              return '<div class="issue-item low">' +
                '<div class="issue-title">' + m.order + '. ' + m.name + '</div>' +
                '<div class="issue-desc">' + (m.content || '') + ' — ' + (m.visual || '') + '</div>' +
                '</div>';
            }).join('') +
            '<p style="color:#6366f1;font-size:12px;padding:12px 0 4px">正在进行第二步：用以上清单核对开发稿...</p>';

          // Step 2: 上传开发稿 + 设计稿清单，做对比
          setStatus('正在对比开发稿...', true);
          var designSpecText = modules.map(function(m) {
            return (m.order || '') + '. ' + (m.name || '') + '：' + (m.content || '') + '，视觉特征：' + (m.visual || '');
          }).join('\n');

          var devForm = new FormData();
          devForm.append('files', devBlob, 'DEV_' + devName + '.png');
          devForm.append('designSpec', designSpecText);
          if (bgText) devForm.append('content', bgText);

          return fetch(serverUrl + '/api/figma/dev', { method: 'POST', body: devForm });
        })
        .then(function(r) {
          if (!r.ok) return r.text().then(function(t) { throw new Error('开发稿对比失败: ' + r.status + ' ' + t); });
          return r.json();
        })
        .then(function(devResult) {
          var issues = devResult.issues || [];
          showIssues(issues);
          setStatus('', false);
          resetButton();
        });
    }

    window.onmessage = async function(e) {
      var msg = e.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'selection') {
        var devTag = document.getElementById('devTag');
        var designTag = document.getElementById('designTag');
        var devLabel = document.getElementById('devLabel');
        var designLabel = document.getElementById('designLabel');
        var devInfo = document.getElementById('devInfo');
        var designInfo = document.getElementById('designInfo');

        if (msg.dev) {
          devLabel.textContent = msg.dev.name;
          devTag.className = 'node-tag ' + (msg.dev.valid ? 'valid' : 'invalid');
          devInfo.textContent = msg.dev.valid ? msg.dev.count + ' 个子节点' : '不是 Frame，请重新选择';
        } else {
          devTag.className = 'node-tag';
          devLabel.textContent = '① 开发稿';
          devInfo.textContent = '';
        }

        if (msg.design) {
          designLabel.textContent = msg.design.name;
          designTag.className = 'node-tag ' + (msg.design.valid ? 'valid' : 'invalid');
          designInfo.textContent = msg.design.valid ? msg.design.count + ' 个子节点' : '不是 Frame，请重新选择';
        } else {
          designTag.className = 'node-tag';
          designLabel.textContent = '② 设计稿';
          designInfo.textContent = '';
        }
      }

      if (msg.type === 'status') {
        setStatus(msg.message, true);
      }

      if (msg.type === 'send-to-server') {
        // 显示预览图
        document.getElementById('devPreview').src = 'data:image/png;base64,' + msg.devB64;
        document.getElementById('designPreview').src = 'data:image/png;base64,' + msg.designB64;
        document.getElementById('previewSection').style.display = 'block';

        // base64 → Blob
        function b64ToBlob(b64, mime) {
          var byteStr = atob(b64);
          var bytes = new Uint8Array(byteStr.length);
          for (var i = 0; i < byteStr.length; i++) bytes[i] = byteStr.charCodeAt(i);
          return new Blob([bytes], { type: mime });
        }

        var devBlob = b64ToBlob(msg.devB64, 'image/png');
        var designBlob = b64ToBlob(msg.designB64, 'image/png');

        uploadToServer(devBlob, designBlob, msg.devName, msg.designName, msg.bgText || '')
          .catch(function(err) {
            var list = document.getElementById('issuesList');
            list.style.display = 'block';
            list.innerHTML = '<p style="color:#dc2626;font-size:13px;text-align:center;padding:12px">' + err.message + '</p>';
            setStatus('', false);
            resetButton();
          });
      }

      if (msg.type === 'error') {
        setStatus('', false);
        var list = document.getElementById('issuesList');
        list.style.display = 'block';
        list.innerHTML = '<p style="color:#dc2626;font-size:13px;text-align:center;padding:12px">' + msg.message + '</p>';
        resetButton();
      }

      if (msg.type === 'review-error') {
        var list = document.getElementById('issuesList');
        list.style.display = 'block';
        list.innerHTML = '<p style="color:#dc2626;font-size:13px;text-align:center;padding:12px">服务器错误：' + (msg.message || '未知错误') + '</p>';
        resetButton();
      }

      if (msg.type === 'debug') {
        setStatus('DEBUG: ' + msg.message, true);
        setTimeout(function() { setStatus('', false); }, 3000);
      }
    };
  </script>
</body>
</html>
