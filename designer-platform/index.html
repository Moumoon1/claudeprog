<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Pilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #111;
      background: #fff;
      overflow-x: hidden;
    }

    /* Hero section */
    .hero {
      position: relative;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 40px 60px;
      overflow: hidden;
      background: linear-gradient(180deg, #fff 0%, #f5f8ff 40%, #fff 100%);
    }

    /* Gradient orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      top: 10%;
      left: 15%;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.07) 0%, transparent 70%);
    }

    .orb-2 {
      top: 30%;
      right: 10%;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.06) 0%, transparent 70%);
    }

    .orb-3 {
      bottom: 0;
      left: 40%;
      width: 500px;
      height: 300px;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 100px;
      background: rgba(56, 189, 248, 0.06);
      border: 1px solid rgba(56, 189, 248, 0.15);
      font-size: 12px;
      font-weight: 500;
      color: #0284c7;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .hero-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #38bdf8;
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero h1 {
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #0c4a6e 0%, #0369a1 30%, #0284c7 60%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero .subtitle {
      font-size: 17px;
      color: #94a3b8;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* Cards section */
    .home {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px 80px;
      position: relative;
      z-index: 2;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8ecf1;
      border-radius: 16px;
      padding: 28px 22px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 210px;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #38bdf8, #818cf8, transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 0%, rgba(56, 189, 248, 0.03) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(56, 189, 248, 0.25);
      box-shadow: 0 8px 40px rgba(56, 189, 248, 0.08), 0 1px 3px rgba(0,0,0,0.04);
    }

    .card:hover::before,
    .card:hover::after {
      opacity: 1;
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .card-icon.prd {
      background: linear-gradient(135deg, #e0f2fe, #f0f9ff);
      border: 1px solid rgba(56, 189, 248, 0.12);
    }

    .card-icon.usertest {
      background: linear-gradient(135deg, #d1fae5, #f0fdf4);
      border: 1px solid rgba(52, 211, 153, 0.12);
    }

    .card-icon.uicheck {
      background: linear-gradient(135deg, #ede9fe, #f5f3ff);
      border: 1px solid rgba(139, 92, 246, 0.12);
    }

    .card-icon.lowfi {
      background: linear-gradient(135deg, #e0e7ff, #eef2ff);
      border: 1px solid rgba(99, 102, 241, 0.12);
    }

    .card-icon.builder {
      background: linear-gradient(135deg, #fff7ed, #ffedd5);
      border: 1px solid rgba(251, 146, 60, 0.12);
    }

    .card h2 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 10px;
      color: #1e293b;
      position: relative;
      z-index: 1;
    }

    .card p {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.6;
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
      padding-top: 16px;
      position: relative;
      z-index: 1;
    }

    .card-tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
      border: 1px solid #e8ecf1;
      color: #94a3b8;
      background: #f8fafc;
    }

    .card-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, transform 0.3s;
    }

    .card-arrow svg {
      width: 14px;
      height: 14px;
      stroke: #94a3b8;
      transition: stroke 0.3s;
    }

    .card:hover .card-arrow {
      background: #0284c7;
      transform: scale(1.08);
    }

    .card:hover .card-arrow svg {
      stroke: #fff;
    }

    @media (max-width: 1024px) {
      .cards { grid-template-columns: repeat(2, 1fr); }
      .hero h1 { font-size: 48px; }
    }

    @media (max-width: 640px) {
      .cards { grid-template-columns: 1fr; }
      .hero h1 { font-size: 36px; }
      .hero { padding: 60px 20px 50px; min-height: 300px; }
      .home { padding: 0 16px 60px; }
    }

    /* Hero search */
    .hero-search {
      margin-top: 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      background: #fff;
      border-radius: 999px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
      padding: 6px 6px 6px 20px;
      transition: box-shadow 0.2s;
    }
    .hero-search:focus-within {
      box-shadow: 0 4px 24px rgba(56,189,248,0.12), 0 0 0 2px rgba(56,189,248,0.25);
    }
    .hero-search-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      stroke: #94a3b8;
    }
    .hero-search-input {
      flex: 1;
      border: none;
      outline: none;
      font-size: 15px;
      font-family: inherit;
      color: #111;
      background: transparent;
      line-height: 40px;
    }
    .hero-search-input::placeholder {
      color: #c0c0c0;
    }
    @media (max-width: 640px) {
      .hero-search {
        margin-top: 24px;
        padding: 4px 4px 4px 16px;
      }
      .hero-search-input {
        font-size: 14px;
      }
    }
</style>
</head>
<body>

  <!-- Hero -->
  <div class="hero">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="hero-content">
      <div class="hero-badge">
        <span class="dot"></span>
        Powered by Claude Code
      </div>
      <h1>Design Pilot</h1>
      <p class="subtitle">AI 驱动的设计辅助分析平台<br>覆盖需求、走查、评审与风险预警全流程</p>

      <!-- Hero search -->
      <div class="hero-search">
        <svg class="hero-search-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="hero-search-input" id="heroSearch" placeholder="搜索功能，例如：走查、看板、PRD 分析..." onkeydown="if(event.key==='Enter')doSearch()">
      </div>
    </div>
  </div>

  <!-- Cards -->
  <div class="home">
    <div class="cards">
      <a href="prd.html" class="card">
        <div class="card-icon prd">📄</div>
        <h2>PRD 分析</h2>
        <p>粘贴 PRD 或需求文档，分析需求逻辑、页面流程和交互合理性</p>
        <div class="card-footer">
          <span class="card-tag">需求分析</span>
          <div class="card-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </div>
        </div>
      </a>

      <a href="lowfi.html" class="card">
        <div class="card-icon lowfi">🔗</div>
        <h2>AI 交互创建</h2>
        <p>输入 PRD 和 Figma 链接，AI 自动生成完整交互流程并绘制到 Figma 画布</p>
        <div class="card-footer">
          <span class="card-tag">交互原型</span>
          <div class="card-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </div>
        </div>
      </a>

      <a href="uicheck.html" class="card">
        <div class="card-icon uicheck">🔍</div>
        <h2>走查</h2>
        <p>对比开发截图与设计稿，快速识别模块缺失、样式偏差等问题</p>
        <div class="card-footer">
          <span class="card-tag">视觉走查</span>
          <div class="card-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </div>
        </div>
      </a>

      <a href="builder.html" class="card">
        <div class="card-icon builder">📊</div>
        <h2>B端看板搭建</h2>
        <p>输入 Figma 组件库链接和需求，AI 自动将看板页面绘制到 Figma 画布</p>
        <div class="card-footer">
          <span class="card-tag">看板生成</span>
          <div class="card-arrow">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </div>
        </div>
      </a>
    </div>
  </div>

  <script>
    function doSearch() {
      const q = document.getElementById('heroSearch').value.trim().toLowerCase();
      if (!q) return;
      const map = {
        'prd': 'prd.html', '需求': 'prd.html', '分析': 'prd.html',
        '交互': 'lowfi.html', '创建': 'lowfi.html', 'lowfi': 'lowfi.html',
        '走查': 'uicheck.html', '对比': 'uicheck.html', '开发稿': 'uicheck.html', '设计稿': 'uicheck.html',
        '看板': 'builder.html', '搭建': 'builder.html', 'b端': 'builder.html', 'dashboard': 'builder.html'
      };
      for (const [keyword, url] of Object.entries(map)) {
        if (q.includes(keyword)) {
          window.location.href = url;
          return;
        }
      }
      // No match, go to closest or show alert
      const allPages = ['prd.html', 'lowfi.html', 'uicheck.html', 'builder.html'];
      window.location.href = allPages[0];
    }
  </script>
</body>
</html>
