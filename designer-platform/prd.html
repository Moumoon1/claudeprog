<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD分析 - Design Pilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">&#8592; 返回首页</a>
    <h1>PRD分析</h1>
  </div>

  <div class="page">
    <div class="page-desc">粘贴 PRD 或需求文档，AI 从逻辑完整性、页面流程、交互合理性、异常场景等角度分析需求，帮助发现潜在漏洞和不合理设计。</div>
    <div class="section">
      <h3>&#128221; 输入 PRD / 需求内容</h3>
      <textarea id="prdContent" rows="16" placeholder="在此粘贴 PRD、需求文档、原型说明或流程描述..."></textarea>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="analyzePRD()">
      <span class="spinner"></span>
      <span class="btn-text">开始分析</span>
    </button>

    <div class="error-msg" id="errorMsg" style="display:none"></div>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="loading-steps" id="loadingSteps">
        <div class="loading-step" id="stepUpload">
          <span class="step-indicator"></span>
          <span>上传文件</span>
        </div>
        <div class="loading-step" id="stepAnalyze">
          <span class="step-indicator"></span>
          <span>Claude Code 分析中</span>
        </div>
        <div class="loading-step" id="stepDone">
          <span class="step-indicator"></span>
          <span>分析完成</span>
        </div>
      </div>
      <div class="loading-text" id="loadingText">请稍候...</div>
    </div>

    <div class="result-area" id="resultArea">
      <div class="section">
        <h3>&#128203; 分析结果</h3>
        <div class="result-content" id="resultContent"></div>
      </div>
    </div>
  </div>

  <script>
    function setLoading(show, step) {
      const overlay = document.getElementById('loadingOverlay');
      if (show) {
        overlay.classList.add('active');
        if (step) {
          document.querySelectorAll('.loading-step').forEach(s => s.classList.remove('active'));
          document.getElementById(step).classList.add('active');
        }
      } else {
        overlay.classList.remove('active');
      }
    }

    function setStepDone(step) {
      document.getElementById(step).classList.remove('active');
      document.getElementById(step).classList.add('done');
    }

    function setLoadingText(text) {
      document.getElementById('loadingText').textContent = text;
    }

    async function analyzePRD() {
      const content = document.getElementById('prdContent').value.trim();
      if (!content) return alert('请输入 PRD 内容');

      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const resultArea = document.getElementById('resultArea');
      const resultContent = document.getElementById('resultContent');

      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.style.display = 'none';
      resultArea.classList.remove('visible');
      resultContent.innerHTML = '';

      document.querySelectorAll('.loading-step').forEach(s => {
        s.classList.remove('active', 'done');
      });

      try {
        setLoading(true, 'stepUpload');
        setLoadingText('上传文件中...');

        const formData = new FormData();
        const blob = new Blob([content], { type: 'text/plain' });
        formData.append('files', blob, 'prd.txt');
        formData.append('content', content);

        const uploadRes = await fetch('/api/upload/prd', {
          method: 'POST',
          body: formData
        });

        setStepDone('stepUpload');
        if (!uploadRes.ok) throw new Error('上传失败');

        setLoading(true, 'stepAnalyze');
        setLoadingText('Claude Code 启动中...');
        resultArea.classList.add('visible');
        const eventSource = new EventSource('/api/analyze/prd');
        let accumulated = '';

        eventSource.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'status') {
            resultContent.innerHTML = `<p style="color:#6366f1">${msg.content}</p>`;
            setLoadingText(msg.content);
          } else if (msg.type === 'chunk') {
            accumulated += msg.content;
            resultContent.innerHTML = marked.parse(accumulated);
            if (accumulated.length > 20) {
              setLoading(false);
              setStepDone('stepAnalyze');
            }
          } else if (msg.type === 'error') {
            errorMsg.textContent = msg.content;
            errorMsg.style.display = 'block';
            setLoading(false);
            eventSource.close();
          } else if (msg.type === 'done') {
            setStepDone('stepAnalyze');
            setStepDone('stepDone');
            setLoadingText('分析完成');
            setTimeout(() => setLoading(false), 600);
            eventSource.close();
          }
        };

        eventSource.onerror = (e) => {
          eventSource.close();
        };
      } catch (e) {
        setLoading(false);
        errorMsg.textContent = '请求失败: ' + e.message;
        errorMsg.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
