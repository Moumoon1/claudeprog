<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD分析 - Design Pilot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="header">
    <a href="index.html" class="back-btn">&#8592; 返回首页</a>
    <h1>PRD分析</h1>
  </div>

  <div class="page page-wide">
    <div class="page-desc">粘贴 PRD 链接或需求文本，AI 自动分析页面流程、交互逻辑与潜在风险，生成可视化报告，帮助设计师快速抓住重点。</div>

    <!-- Tab Switcher -->
    <div class="upload-tabs">
      <div class="upload-tab active" data-tab="url" onclick="switchInputTab('url')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        链接输入
      </div>
      <div class="upload-tab" data-tab="text" onclick="switchInputTab('text')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        文本粘贴
      </div>
    </div>

    <!-- URL Input -->
    <div class="tab-content active" id="urlTab">
      <div class="section prd-input-section">
        <div class="url-input-wrapper">
          <span class="url-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </span>
          <input type="url" id="prdUrl" class="prd-url-input" placeholder="粘贴 PRD 链接 URL，例如 https://docs.corp.kuaishou.com/d/home/xxx">
        </div>
        <div class="extension-status" id="extensionStatus">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">检测扩展中...</span>
          <a class="install-link" href="#" onclick="showInstallGuide(event)">如何安装扩展</a>
        </div>
      </div>
    </div>

    <!-- Text Input -->
    <div class="tab-content" id="textTab">
      <div class="section">
        <textarea id="prdText" rows="14" placeholder="在此粘贴 PRD、需求文档、原型说明或流程描述..."></textarea>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="analyzePRD()">
      <span class="spinner"></span>
      <span class="btn-text">开始分析</span>
    </button>

    <div class="error-msg" id="errorMsg" style="display:none"></div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="loading-steps" id="loadingSteps">
        <div class="loading-step" id="stepFetch">
          <span class="step-indicator"></span>
          <span>获取 PRD 内容</span>
        </div>
        <div class="loading-step" id="stepAnalyze">
          <span class="step-indicator"></span>
          <span>FlickCLI 分析中</span>
        </div>
        <div class="loading-step" id="stepDone">
          <span class="step-indicator"></span>
          <span>分析完成</span>
        </div>
      </div>
      <div class="loading-text" id="loadingText">请稍候...</div>
    </div>

    <!-- Result Area -->
    <div class="result-area" id="resultArea">
      <!-- View Toggle -->
      <div class="result-header">
        <h2 class="result-title">分析结果</h2>
        <div class="view-toggle">
          <button class="view-btn active" data-view="dashboard" onclick="switchView('dashboard')">可视化</button>
          <button class="view-btn" data-view="raw" onclick="switchView('raw')">原文</button>
        </div>
      </div>

      <!-- Dashboard View -->
      <div class="dashboard-view" id="dashboardView">
        <!-- Hero Zone -->
        <div class="hero-zone">
          <!-- Score Card -->
          <div class="score-card" id="scoreCard">
            <div class="score-main">
              <div class="score-circle">
                <svg viewBox="0 0 136 136" class="score-ring">
                  <circle class="score-ring-bg" cx="68" cy="68" r="55" />
                  <circle class="score-ring-fill" cx="68" cy="68" r="55" id="scoreRingFill" />
                </svg>
                <div class="score-number" id="scoreNumber">--</div>
              </div>
              <div class="score-info">
                <div class="score-grade" id="scoreGrade">--</div>
                <div class="score-total-label">PRD quality score</div>
              </div>
            </div>
            <div class="score-dims" id="scoreDims"></div>
          </div>

          <!-- Context Cards -->
          <div class="context-row" id="contextRow">
            <div class="context-card" id="goalCard">
              <div class="context-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><line x1="12" y1="2" x2="12" y2="5"/></svg>
              </div>
              <div class="context-content">
                <div class="context-label">业务目标</div>
                <div class="context-value" id="goalStat">--</div>
              </div>
            </div>
            <div class="context-card" id="userCard">
              <div class="context-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </div>
              <div class="context-content">
                <div class="context-label">目标用户</div>
                <div class="context-value" id="userStat">--</div>
              </div>
            </div>
          </div>

          <!-- Stats Row -->
          <div class="stats-row" id="statsRow">
            <div class="stat-box">
              <div class="stat-box-label">核心页面</div>
              <div class="stat-box-value" id="pageStat">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">核心模块</div>
              <div class="stat-box-value" id="moduleStat">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">交互问题</div>
              <div class="stat-box-value" id="issueStat">0</div>
            </div>
            <div class="stat-box">
              <div class="stat-box-label">设计待确认</div>
              <div class="stat-box-value" id="confirmStat">0</div>
            </div>
          </div>
        </div>

        <!-- Flow Path -->
        <div class="dash-section" id="flowSection">
          <div class="dash-section-title"><span class="section-num">01</span>页面流程</div>
          <div class="flow-path" id="flowPath"></div>
        </div>

        <!-- PRD Images Gallery -->
        <div class="dash-section" id="prdImagesSection">
          <div class="dash-section-title"><span class="section-num">02</span>原型图</div>
          <div class="prd-images-grid" id="prdImagesGrid"></div>
        </div>

        <!-- Lightbox -->
        <div class="lightbox" id="lightbox" onclick="closeLightbox()">
          <img id="lightboxImg" src="" alt="" />
          <div class="lightbox-caption" id="lightboxCaption"></div>
        </div>


        <!-- Core Modules -->
        <div class="dash-section" id="modulesSection">
          <div class="dash-section-title"><span class="section-num">03</span>核心模块</div>
          <div class="module-grid" id="moduleGrid"></div>
        </div>

        <!-- Issues - unified, 2-column -->
        <div class="dash-section" id="issuesSection">
          <div class="dash-section-title"><span class="section-num">04</span>问题清单</div>
          <div class="issue-grid" id="issueGrid"></div>
        </div>

        <!-- Design Focus - card layout -->
        <div class="dash-section" id="designFocusSection">
          <div class="dash-section-title"><span class="section-num">05</span>设计师关注点</div>
          <div class="focus-grid" id="focusGrid"></div>
        </div>
      </div>

      <!-- Raw Markdown View -->
      <div class="raw-view" id="rawView">
        <div class="section">
          <h3>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            原始分析结果
          </h3>
          <div class="result-content" id="resultContent"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let resultMarkdown = '';
    let dashboardData = null;
    let prdImages = [];
    let currentInputTab = 'url';
    let extensionAvailable = false;

    // Detect if the Chrome extension is installed
    (function detectExtension() {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');

      // Listen for responses from the content script
      window.addEventListener('message', function handler(event) {
        if (event.data && event.data.source === 'design-pilot-prd-response') {
          extensionAvailable = true;
          if (dot) dot.classList.add('active');
          if (text) text.textContent = '扩展已连接';
          // Don't remove listener - keep listening for fetch responses
        }
      });

      // Wait 3 seconds, if no response try ping once more
      setTimeout(() => {
        if (!extensionAvailable) {
          // Try sending ping as backup
          try {
            window.postMessage({ source: 'design-pilot-prd', action: 'ping' }, '*');
          } catch {}
          // Wait another 2 seconds for ping response
          setTimeout(() => {
            if (!extensionAvailable) {
              if (dot) dot.classList.remove('active');
              if (text) text.textContent = '扩展未安装';
            }
          }, 2000);
        }
      }, 3000);

      // Content script sends 'ready' on load, listen for that first
    })();

    function showInstallGuide(e) {
      e.preventDefault();
      const overlay = document.createElement('div');
      overlay.className = 'install-modal';
      overlay.onclick = () => overlay.remove();
      overlay.innerHTML = `<div class="install-modal-content" onclick="event.stopPropagation()">
        <h3>安装 Design Pilot Chrome 扩展</h3>
        <p>这个扩展可以帮助我们从你的浏览器中提取内网文档内容。</p>
        <ol>
          <li>打开 Chrome，地址栏输入 <code>chrome://extensions/</code></li>
          <li>右上角开启「开发者模式」</li>
          <li>点击「加载已解压的扩展程序」</li>
          <li>选择目录：<code>${location.origin}/chrome-extension/</code></li>
          <li>回到此页面，刷新即可</li>
        </ol>
        <button onclick="this.closest('.install-modal').remove()">知道了</button>
      </div>`;
      document.body.appendChild(overlay);
    }

    function switchInputTab(tab) {
      currentInputTab = tab;
      document.querySelectorAll('.upload-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === tab + 'Tab'));
    }

    function setLoading(show, step) {
      const overlay = document.getElementById('loadingOverlay');
      if (show) {
        overlay.classList.add('active');
        if (step) {
          document.querySelectorAll('.loading-step').forEach(s => s.classList.remove('active'));
          document.getElementById(step).classList.add('active');
        }
      } else {
        overlay.classList.remove('active');
      }
    }

    function setStepDone(step) {
      document.getElementById(step).classList.remove('active');
      document.getElementById(step).classList.add('done');
    }

    function setLoadingText(text) {
      document.getElementById('loadingText').textContent = text;
    }

    function switchView(view) {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      document.getElementById('dashboardView').style.display = view === 'dashboard' ? 'block' : 'none';
      document.getElementById('rawView').style.display = view === 'raw' ? 'block' : 'none';
    }

    function parseJSONFromOutput(text) {
      const jsonMatch = text.match(/```json\s*([\s\S]*?)\s*```/);
      if (jsonMatch) {
        try {
          const parsed = JSON.parse(jsonMatch[1]);
          if (parsed && parsed.summary) return parsed;
        } catch {}
      }
      const objMatch = text.match(/\{[\s\S]*?"summary"[\s\S]*\}/);
      if (objMatch) {
        try {
          const parsed = JSON.parse(objMatch[0]);
          if (parsed && parsed.summary) return parsed;
        } catch {}
      }
      return null;
    }

    function renderDashboard(data) {
      dashboardData = data;
      renderScore(data.score);
      renderOverview(data.summary);
      renderFlowPath(data.flow);
      renderPRDImages(prdImages);
      renderModuleGrid(data.summary);
      renderIssueGrid(data.issues);
      renderFocusGrid(data.design_focus);
    }

    function renderScore(score) {
      if (!score || !score.total) {
        document.getElementById('scoreCard').style.display = 'none';
        return;
      }
      document.getElementById('scoreCard').style.display = 'block';

      // Animate score number
      const total = score.total;
      const gradeEl = document.getElementById('scoreGrade');
      const numberEl = document.getElementById('scoreNumber');
      const ringFill = document.getElementById('scoreRingFill');

      // Grade label
      let grade = '';
      if (total >= 85) grade = '优秀';
      else if (total >= 70) grade = '良好';
      else if (total >= 55) grade = '及格';
      else if (total >= 40) grade = '较差';
      else grade = '不合格';

      gradeEl.textContent = grade;
      gradeEl.className = 'score-grade grade-' + (total >= 85 ? 'a' : total >= 70 ? 'b' : total >= 55 ? 'c' : total >= 40 ? 'd' : 'f');

      // Animate number
      let current = 0;
      const step = Math.max(1, Math.ceil(total / 30));
      const timer = setInterval(() => {
        current += step;
        if (current >= total) {
          current = total;
          clearInterval(timer);
        }
        numberEl.textContent = current;
      }, 30);

      // Ring
      const circumference = 2 * Math.PI * 55;
      ringFill.style.strokeDasharray = circumference;
      ringFill.style.strokeDashoffset = circumference;
      setTimeout(() => {
        const pct = total / 100;
        ringFill.style.transition = 'stroke-dashoffset 1.2s ease-out';
        ringFill.style.strokeDashoffset = circumference * (1 - pct);
      }, 100);

      // Dimension bars
      const dimsEl = document.getElementById('scoreDims');
      const dims = score.dimensions || {};
      dimsEl.innerHTML = Object.values(dims).map(dim => {
        const pct = (dim.score / 20) * 100;
        const label = (dim.label || '').replace('undefined', '未提供');
        return `<div class="dim-row">
          <div class="dim-label">
            <span class="dim-name">${label}</span>
            <span class="dim-score">${dim.score}/20</span>
          </div>
          <div class="dim-bar-bg">
            <div class="dim-bar-fill" style="width:${pct}%"></div>
          </div>
          ${dim.desc ? '<div class="dim-desc">' + dim.desc + '</div>' : ''}
        </div>`;
      }).join('');
    }

    function renderOverview(summary) {
      const goal = summary.goal || '--';
      document.getElementById('goalStat').textContent = goal;

      const users = summary.target_users || [];
      document.getElementById('userStat').textContent = users.length > 0 ? users.join(' / ') : '--';

      // Core pages + flow steps combined
      const pages = dashboardData?.flow?.pages || [];
      const mainPath = dashboardData?.flow?.main_path || [];
      const pageCount = mainPath.length > 0 ? mainPath.length : pages.length;
      document.getElementById('pageStat').textContent = pageCount + ' 页';

      // Core modules
      const modules = summary.main_modules || [];
      document.getElementById('moduleStat').textContent = modules.length;

      // Total issues
      const issues = dashboardData?.issues || [];
      document.getElementById('issueStat').textContent = issues.length;

      // Open questions
      document.getElementById('confirmStat').textContent = summary.open_question_count || 0;
    }

    function renderFlowPath(flow) {
      const section = document.getElementById('flowSection');
      const container = document.getElementById('flowPath');
      const pages = flow?.pages || [];
      const mainPath = flow?.main_path || [];
      const unclearSteps = flow?.unclear_steps || [];

      if (pages.length === 0 && mainPath.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';

      const unclearSet = new Set(unclearSteps.map(s => typeof s === 'string' ? s : s.name));
      const steps = mainPath.length > 0 ? mainPath : pages;

      container.innerHTML = steps.map((step, i) => {
        const isUnclear = unclearSet.has(step);
        const arrow = i < steps.length - 1 ? '<div class="flow-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>' : '';
        return `<div class="flow-step${isUnclear ? ' unclear' : ''}">
          <div class="flow-step-name">${step}</div>
          ${isUnclear ? '<div class="flow-step-warn">&#63; 步骤不清晰</div>' : ''}
        </div>${arrow}`;
      }).join('');
    }

    function renderPRDImages(images) {
      const section = document.getElementById('prdImagesSection');
      const grid = document.getElementById('prdImagesGrid');
      console.log('[PRD render] renderPRDImages called with', images ? images.length : 'null', images);
      if (!images || images.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';
      grid.innerHTML = images.map((img, i) => {
        const src = img.dataUrl;
        if (!src || src.length < 100) return '';
        const caption = cleanImageCaption(img.alt || img.caption || '');
        return `<div class="prd-image-card" onclick="openLightbox('${src}', '${caption.replace(/'/g, "\\'")}')">
          <div class="prd-image-wrapper">
            <img src="${src}" alt="${caption}" loading="lazy" />
          </div>
          ${caption ? '<div class="prd-image-caption">' + caption + '</div>' : ''}
        </div>`;
      }).filter(Boolean).join('');
    }

    function isLikelyPRDImage(img) {
      const w = Math.max(Number(img.width || 0), Number(img.displayWidth || 0));
      const h = Math.max(Number(img.height || 0), Number(img.displayHeight || 0));
      if (w < 260 || h < 160 || w * h < 90000) return false;
      const ratio = w / Math.max(h, 1);
      if (w <= 320 && h <= 320 && ratio > 0.7 && ratio < 1.45) return false;
      const text = [img.src, img.alt, img.caption, img.context].filter(Boolean).join(' ').toLowerCase();
      return !/(avatar|portrait|profile|head|user|face|emoji|icon|logo|badge|comment|like|reaction|default|头像|用户|评论|点赞|侧边栏)/i.test(text);
    }

    function cleanImageCaption(text) {
      text = (text || '').replace(/\s+/g, ' ').trim();
      if (/vodka-|embeddedobject|image-container|image-wrapper|goog-inline-block/i.test(text)) return '';
      return text.slice(0, 80);
    }

    function renderModuleGrid(summary) {
      const section = document.getElementById('modulesSection');
      const container = document.getElementById('moduleGrid');
      const modules = summary?.main_modules || [];

      if (modules.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';

      container.innerHTML = modules.map((m, i) => `
        <div class="module-card">
          <div class="module-card-placeholder">
            <div class="module-icon-placeholder">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
            </div>
            <div class="module-card-label">${m}</div>
          </div>
        </div>
      `).join('');
    }

    function renderIssueGrid(issues) {
      const container = document.getElementById('issueGrid');
      const section = document.getElementById('issuesSection');
      if (!issues || issues.length === 0) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';

      const priorityBadge = (priority) => {
        const p = (priority || '').toUpperCase();
        const cls = p === 'P0' ? 'badge-p0' : p === 'P1' ? 'badge-p1' : p === 'P2' ? 'badge-p2' : 'badge-open';
        const label = p === 'P0' ? 'P0' : p === 'P1' ? 'P1' : p === 'P2' ? 'P2' : '待确认';
        return `<span class="issue-badge ${cls}">${label}</span>`;
      };

      container.innerHTML = `<div class="issue-grid-inner">${issues.map(issue => {
        const p = (issue.priority || '').toUpperCase();
        const cardCls = p === 'P0' ? 'p0-card' : p === 'P1' ? 'p1-card' : p === 'P2' ? 'p2-card' : 'open-card';

        const details = [issue.reason, issue.impact, issue.suggestion, issue.pm_question]
          .filter(Boolean)
          .join('<br>');

        return `<div class="issue-card ${cardCls}">
          <div class="issue-card-header">
            <span class="issue-card-module">${issue.module || '通用'}</span>
            ${priorityBadge(issue.priority)}
          </div>
          <div class="issue-card-title">${issue.problem || issue.title || '未命名'}</div>
          ${details ? '<div class="issue-card-detail">' + details + '</div>' : ''}
        </div>`;
      }).join('')}</div>`;
    }

    function renderFocusGrid(designFocus) {
      const section = document.getElementById('designFocusSection');
      const container = document.getElementById('focusGrid');
      if (!designFocus || (typeof designFocus === 'object' && Object.keys(designFocus).length === 0)) {
        section.style.display = 'none';
        return;
      }
      section.style.display = 'block';

      if (typeof designFocus === 'string') {
        container.innerHTML = '<div class="focus-card"><div class="focus-card-text">' + designFocus + '</div></div>';
      } else {
        container.innerHTML = Object.entries(designFocus).map(([key, val]) =>
          `<div class="focus-card">
            <div class="focus-card-label">${key}</div>
            <div class="focus-card-text">${val}</div>
          </div>`
        ).join('');
      }
    }

    async function fetchViaExtension(url, timeoutMs = 180000) {
      return new Promise((resolve) => {
        const requestId = 'prd-fetch-' + Date.now() + '-' + Math.random().toString(36).slice(2);
        const timeout = setTimeout(() => {
          window.removeEventListener('message', handler);
          resolve(null);
        }, timeoutMs);
        const handler = (event) => {
          if (event.data && event.data.source === 'design-pilot-prd-response' && event.data.requestId === requestId) {
            console.log('[PRD fetch] Extension response:', event.data && event.data.success, 'images:', event.data && event.data.images ? event.data.images.length : 0);
            clearTimeout(timeout);
            window.removeEventListener('message', handler);
            resolve(event.data);
          }
        };
        window.addEventListener('message', handler);
        window.postMessage({ source: 'design-pilot-prd', action: 'fetchContent', url: url, requestId: requestId }, '*');
      });
    }

    async function fetchUrlByBrowser(url) {
      try {
        const response = await fetch(url, { credentials: 'include', mode: 'cors' });
        if (response.ok) {
          const html = await response.text();
          return html.replace(/<script[\s\S]*?<\/script>/gi, '')
                     .replace(/<style[\s\S]*?<\/style>/gi, '')
                     .replace(/<[^>]+>/g, ' ')
                     .replace(/&nbsp;/g, ' ')
                     .replace(/\s+/g, ' ')
                     .trim();
        }
      } catch {
        // CORS blocked
      }
      return null;
    }

    async function analyzePRD() {
      let content = '';
      let fetchMethod = '';

      if (currentInputTab === 'url') {
        content = document.getElementById('prdUrl').value.trim();
        if (!content) return alert('请输入 PRD 链接');
      } else {
        content = document.getElementById('prdText').value.trim();
        if (!content) return alert('请粘贴 PRD 内容');
      }

      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      const resultArea = document.getElementById('resultArea');
      const resultContent = document.getElementById('resultContent');

      btn.classList.add('loading');
      btn.disabled = true;
      errorMsg.style.display = 'none';
      resultArea.classList.remove('visible');
      resultContent.innerHTML = '';
      resultMarkdown = '';
      dashboardData = null;
      prdImages = [];

      document.querySelectorAll('.loading-step').forEach(s => {
        s.classList.remove('active', 'done');
      });

      try {
        if (currentInputTab === 'url') {
          setLoading(true, 'stepFetch');

          // Try Chrome extension first (has logged-in cookies)
          setLoadingText('通过浏览器扩展抓取 PRD 内容...');
          const extResult = await fetchViaExtension(content);
          let images = [];
          if (extResult && extResult.success && extResult.text && extResult.text.length > 200) {
            fetchMethod = 'extension';
            content = extResult.text;
            images = extResult.images || [];
            console.log('[PRD fetch] Extension meta:', extResult.meta || null);
            console.log('[PRD fetch] Raw images from extension:', images.length);
            images.forEach((img, i) => {
              console.log('[PRD fetch] Image ' + i + ': src=' + (img.src ? img.src.substring(0, 80) : '(no src)') + ', dataUrl length=' + (img.dataUrl ? img.dataUrl.length : 0) + ', status=' + (img.status || 'ok') + ', error=' + (img.error || 'none'));
            });
            const validImages = images.filter(img => img.dataUrl && img.dataUrl.length > 100 && isLikelyPRDImage(img));
            const imgCount = validImages.length > 0 ? '，提取到 ' + validImages.length + ' 张可用图' : '，但图片下载失败（dataUrl为空）';
            const scrollInfo = extResult.meta && extResult.meta.scroll ? '，滚动 ' + extResult.meta.scroll.iterations + ' 次' : '';
            setLoadingText('已从浏览器提取 ' + extResult.text.length + ' 字符内容' + scrollInfo + imgCount);
          } else {
            if (extensionAvailable && !extResult) {
              throw new Error('扩展抓取超时：文档较大或图片较多，请重新加载扩展后再试');
            }
            if (extensionAvailable && extResult && extResult.error) {
              throw new Error('扩展抓取失败：' + extResult.error);
            }
            // Fallback: try CORS fetch
            console.log('[PRD fetch] Extension failed, trying CORS fetch');
            setLoadingText('扩展抓取失败，尝试直接访问...');
            const corsContent = await fetchUrlByBrowser(content);
            if (corsContent && corsContent.length > 200) {
              fetchMethod = 'cors';
              content = corsContent;
              console.log('[PRD fetch] CORS fetch succeeded:', content.length, 'chars');
            } else {
              fetchMethod = 'server';
              console.log('[PRD fetch] CORS also failed, using server proxy');
              // Send URL to server for proxy fetch
            }
          }

          const formData = new FormData();
          if (fetchMethod === 'server') {
            formData.append('content', content);
            formData.append('isUrl', 'true');
          } else {
            formData.append('content', content);
            formData.append('isUrl', 'false');
          }
          if (images.length > 0) {
            var validImages = images.filter(img => img.dataUrl && img.dataUrl.length > 100 && isLikelyPRDImage(img));
            if (validImages.length > 0) {
              formData.append('prdImages', JSON.stringify(validImages));
            }
          }

          const uploadRes = await fetch('/api/upload/prd', {
            method: 'POST',
            body: formData
          });

          const uploadJson = await uploadRes.json();
          setStepDone('stepFetch');
          if (!uploadRes.ok || !uploadJson.ok) throw new Error(uploadJson.error || '提交失败');

          // Take all images from extension (AI will filter design-related ones)
          if (images.length > 0) {
            var validImages = images.filter(img => img.dataUrl && img.dataUrl.length > 100 && isLikelyPRDImage(img));
            if (validImages.length > 0) {
              prdImages = validImages.map(img => ({
                dataUrl: img.dataUrl,
                src: img.src,
                alt: img.alt || '',
                caption: img.caption || ''
              }));
              console.log('[PRD] Extracted', prdImages.length, 'images');
            }
          }
        } else {
          setLoading(true, 'stepFetch');
          setLoadingText('提交 PRD 内容...');

          const formData = new FormData();
          formData.append('content', content);
          formData.append('isUrl', 'false');

          const uploadRes = await fetch('/api/upload/prd', {
            method: 'POST',
            body: formData
          });

          const uploadJson = await uploadRes.json();
          setStepDone('stepFetch');
          if (!uploadRes.ok || !uploadJson.ok) throw new Error(uploadJson.error || '提交失败');
        }

        setLoading(true, 'stepAnalyze');
        setLoadingText('FlickCLI 分析中...');
        resultArea.classList.add('visible');
        switchView('dashboard');

        const eventSource = new EventSource('/api/analyze/prd');
        let accumulated = '';

        eventSource.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'status') {
            setLoadingText(msg.content);
          } else if (msg.type === 'chunk') {
            accumulated += msg.content;
            if (accumulated.length > 20) {
              setLoading(false);
              setStepDone('stepAnalyze');
            }
          } else if (msg.type === 'error') {
            errorMsg.textContent = msg.content;
            errorMsg.style.display = 'block';
            setLoading(false);
            eventSource.close();
          } else if (msg.type === 'done') {
            setStepDone('stepAnalyze');
            setStepDone('stepDone');
            setLoadingText('分析完成');

            const json = parseJSONFromOutput(accumulated);
            if (json) {
              renderDashboard(json);
              resultContent.innerHTML = marked.parse(accumulated);
            } else {
              resultContent.innerHTML = marked.parse(accumulated);
            }

            setTimeout(() => setLoading(false), 600);
            eventSource.close();
          }
        };

        eventSource.onerror = (e) => {
          console.error('[PRD analyze] SSE error, readyState:', eventSource.readyState);
          // Only show error if still loading and no content received
          if (accumulated.length === 0) {
            errorMsg.textContent = '分析服务连接失败，请检查服务器是否正常运行 (SSE readyState: ' + eventSource.readyState + ')';
            errorMsg.style.display = 'block';
            setLoading(false);
          }
          eventSource.close();
        };
      } catch (e) {
        setLoading(false);
        errorMsg.textContent = '请求失败: ' + e.message;
        errorMsg.style.display = 'block';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Lightbox
    window.openLightbox = function(src, caption) {
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightboxImg');
      const cap = document.getElementById('lightboxCaption');
      img.src = src;
      cap.textContent = caption || '';
      cap.style.display = caption ? 'block' : 'none';
      lb.classList.add('active');
    };

    window.closeLightbox = function() {
      document.getElementById('lightbox').classList.remove('active');
    };
  </script>
</body>
